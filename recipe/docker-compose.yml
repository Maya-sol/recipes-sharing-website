version: '3'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      - db
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: recipes
      MYSQL_USER: mas
      MYSQL_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
